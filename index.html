<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>テレビ有料化</title>
</head>
<body>
    <h1>テレビ有料化...</h1>
    <p>1秒100円</p>

    <script>
        // 状態を初期化（停止フラグを消しておく）
   // 初期化：再開時刻を「今」に設定
        localStorage.setItem('resume_time', Date.now());

        const interval = setInterval(() => {
            const resumeTime = parseInt(localStorage.getItem('resume_time') || 0);
            const currentTime = Date.now();

            // 現在時刻が「再開予定時刻」を過ぎていたらアラートを出す
            if (currentTime >= resumeTime) {
                alert("止まらないアラート！\nボタン画面で時間を入力して止めてください。");
            } else {
                console.log("一時停止中... あと " + Math.ceil((resumeTime - currentTime) / 1000) + "秒");
            }
        }, 1000); // 1秒ごとにチェック
    </script>
</body>
</html>
