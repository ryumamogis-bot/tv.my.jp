<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><title>一時停止ボタン</title></head>
<body>
    <h2>アラートを一時停止</h2>
    <input type="number" id="seconds" value="5" min="1"> 秒間だけ止める
    <br><br>
    <button id="stopBtn" style="padding:15px; font-size:18px; cursor:pointer;">
        この秒数だけ解除！
    </button>

    <script>
        document.getElementById('stopBtn').onclick = function() {
            const sec = parseInt(document.getElementById('seconds').value);
            if (isNaN(sec) || sec <= 0) return alert("有効な秒数を入れてね");

            // 「現在の時刻 + 指定秒数」を再開時刻として保存
            const resumeAt = Date.now() + (sec * 1000);
            localStorage.setItem('resume_time', resumeAt);

            alert(sec + "秒間だけアラートを止めました。");
        };
    </script>
</body>
</html>
